@if (companySubscription) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(companySubscription.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="companySubscriptionDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmation de suppression
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-companySubscription-heading"
        jhiTranslate="commercialActivitiesApp.companySubscription.delete.question"
        [translateValues]="{ id: companySubscription.id }"
      >
        Êtes-vous certain de vouloir supprimer le Company Subscription {{ companySubscription.id }} ?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
      </button>

      <button id="jhi-confirm-delete-companySubscription" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Supprimer</span>
      </button>
    </div>
  </form>
}
