@if (userManagement) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(userManagement.login!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="userManagementDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmation de suppression
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-userManagement-heading"
        jhiTranslate="userManagement.delete.question"
        [translateValues]="{ id: userManagement.login }"
      >
        Êtes-vous certain de vouloir supprimer l&apos;utilisateur {{ userManagement.login }} ?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
      </button>

      <button id="jhi-confirm-delete-userManagement" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Supprimer</span>
      </button>
    </div>
  </form>
}
